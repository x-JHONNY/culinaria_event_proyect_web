<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinaria Event | Contacto</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <a href="../index.html"><img src="../src/img/image.png" alt="Culinaria Event" class="brand-logo"></a>
        </div>
        <nav>
            <div class="hamburger"><div class="line"></div><div class="line"></div><div class="line"></div></div>
            <ul class="nav-links">
                <li><a href="experiencia.html" class="nav-item">Experiencia</a></li>
                <li><a href="origen.html" class="nav-item">Origen</a></li>
                <li><a href="eventos.html" class="nav-item">Eventos</a></li>
                <li><a href="fusiones.html" class="nav-item">Fusiones Platos</a></li>
                <li><a href="contacto.html" class="nav-item active btn-contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Diseña tu Evento</h1>
            <p class="page-subtitle">Contacta con nosotros para un presupuesto y propuesta de menú a medida</p>
        </div>
        
        <div class="content-block" style="max-width: 700px; margin: 0 auto;">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="nombre">Nombre / Empresa</label>
                    <input type="text" id="nombre" required placeholder="Introduce tu nombre o entidad">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="form-group">
                    <label for="tipo">Tipo de Evento</label>
                    <input type="text" id="tipo" placeholder="Ej: Boda, Gala Corporativa, Almuerzo Privado">
                </div>
                <div class="form-group">
                    <label for="mensaje">Detalles del Evento</label>
                    <textarea id="mensaje" rows="5" placeholder="Cuéntanos la fecha estimada, número de comensales y tus ideas preliminares..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar Solicitud</button>
            </form>
        </div>
    </main>
    <script src="../script.js"></script>
</body>
</html>
